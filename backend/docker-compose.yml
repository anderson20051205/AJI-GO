services:
  nginx:
    image: nginx:alpine
    container_name: ajigo-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - usuarios
      - catalogo
      - pedidos
    networks:
      - ajigo-network
    restart: unless-stopped

  auth:
    build: ./app/auth
    container_name: ajigo-auth
    depends_on:
      - db
    ports:         
      - "8080:8080" # Solo el Auth expuesto para tus pruebas locales
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
    networks:
      - ajigo-network
    restart: unless-stopped

  usuarios:
    build: ./app/usuarios
    container_name: ajigo-usuarios
    depends_on:
      - db
    expose:
      - "8000" # Expose es suficiente para comunicación interna
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ajigo-network
    restart: unless-stopped

  catalogo:
    build: ./app/catalogo
    container_name: ajigo-catalogo
    depends_on:
      - db
    expose:
      - "8080" # Nginx lo encontrará internamente por nombre de servicio
    # ... (resto de configuración igual)
    networks:
      - ajigo-network
    restart: unless-stopped

  pedidos:
    build: ./app/pedidos
    container_name: ajigo-pedidos
    depends_on:
      - db
    expose:
      - "8080" # Nginx lo encontrará internamente por nombre de servicio
    # ... (resto de configuración igual)
    networks:
      - ajigo-network
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ajigo-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ajigo-network
    restart: unless-stopped

networks:
  ajigo-network:
    driver: bridge

volumes:
  sqlserver_data: