services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ajigo-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db/init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
        /opt/mssql/bin/sqlservr &
        SQL_PID=$$!
        echo '⏳ Esperando SQL Server...'
        for i in $$(seq 1 30); do
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -No -C > /dev/null 2>&1 && break
          echo \"   intento $$i/30\"
          sleep 2
        done
        echo '✅ Ejecutando init.sql...'
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -i /init.sql -No -C
        echo '✅ BD lista.'
        wait $$SQL_PID
      "
    networks:
      - ajigo-network
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost",
        "-U", "sa",
        "-P", "${DB_PASSWORD}",
        "-Q", "USE AJIGO; SELECT 1",
        "-No", "-C"
      ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  auth:
    build: ./app/auth
    container_name: ajigo-auth
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=1433
      - DB_USER=${DB_USER:-sa}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-AJIGO}
      - JWT_SECRET=${JWT_SECRET:-secreto}
    networks:
      - ajigo-network

  usuarios:
    build: ./app/usuarios
    container_name: ajigo-usuarios
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=1433
      - DB_USER=${DB_USER:-sa}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-AJIGO}
    networks:
      - ajigo-network

  catalogo:
    build: ./app/catalogo
    container_name: ajigo-catalogo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db:1433;databaseName=${DB_NAME:-AJIGO};encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-sa}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - ajigo-network

  pedidos:
    build: ./app/pedidos
    container_name: ajigo-pedidos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=1433
      - DB_USER=${DB_USER:-sa}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-AJIGO}
    networks:
      - ajigo-network

networks:
  ajigo-network:
    driver: bridge

volumes:
  sqlserver_data: